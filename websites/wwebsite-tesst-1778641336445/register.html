<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huỳnh Minh Long</title>
    <link rel="stylesheet" href="formstyle.css">
</head>

<body style="background-image: url(background.jpg); background-size: 126% auto; background-repeat: no-repeat;">
    <div style="height: 28rem;
        width: 18rem;
        margin: 145px auto;
        box-shadow: 0 0px 20px 0 rgba(255, 255, 255, 0.455), 0 5px 20px 0 rgba(0, 0, 0, 0.521);
        background-color: rgba(163, 250, 255, 0.536);
        display: flex;
        justify-content: center;
        border-radius: 18px;">
        <form style="width: 14rem; display: flex; flex-direction: column; margin-top: 0.5%;" action="index.html">
            <h1 class="bebas-neue-regular" style="margin-left: auto; margin-right: auto;">Register</h1><br>
            <label class="bebas-neue-regular" style="font-size: 20px;" for="emailline">Email
                address:</label><br>
            <input style="border-radius: 4px;" class="bebas-neue-regular" style="height: 19px;" type="email"
                id="emailline" placeholder="name@example.com" required><br>
            <label class="bebas-neue-regular" style="font-size: 20px;" for="nameline">Username:</label><br>
            <input style="border-radius: 4px;" class="bebas-neue-regular" style="height: 19px;" type="text"
                id="nameline" placeholder="Your name."><br>
            <label class="bebas-neue-regular" style="font-size: 20px;" for="Passwordline">Password:</label><br>
            <input style="border-radius: 4px;" class="bebas-neue-regular" style="height: 19px;" type="password"
                name="Passwordline" id="Passwordline" placeholder="Must be 8-20 characters long." minlength="8"
                maxlength="20" required><br><br>
            <button class="bebas-neue-regular" id="button"
                style="font-weight: bold; height: 40px; width: 100px; margin: 0 auto; font-size: 20px; text-align: center;"
                type="submit">Register</button>
            <button id="switchpagebutton" class="bebas-neue-regular" type="submit" onclick="loginpage()">Already have
                an
                account?</button>
        </form>
    </div>
    <script>
        function loginpage() {
            window.location.assign("login.html")
        }
    </script>
</body>

</html>
