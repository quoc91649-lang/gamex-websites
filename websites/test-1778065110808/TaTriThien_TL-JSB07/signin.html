<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Shoe Store</title>
    <link rel="stylesheet" href="signin.css" />
    <style></style>
  </head>
  <body>
    <div class="signin-container">
      <div class="logo">
        <img src="https://media.istockphoto.com/id/1320637680/vector/fast-shoes-logo-template-design.jpg?s=612x612&w=0&k=20&c=W0_unOy4G5mqeim5gVDGh1J4MaiW3-0k6GQeh6XGs9A=" alt="Shoe Store Logo" />
      </div>
      <h2>Sign In to Shoe Haven</h2>
      <form action="signin.php" method="post">
        <div class="form-control">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-control">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button id="btn" style="font-weight: bold;" type="submit" onclick="login()">Sign In</button>
    </form>
    <script>
        function login(){
            window.location.assign("shoe.html")
        }
    </script>
      </form>
      <div class="register-link">
        Don't have an account? <a href="dangnhap.html">Register here</a>
      </div>
    </div>
  </body>
