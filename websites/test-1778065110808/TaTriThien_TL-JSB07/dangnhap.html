<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Shoe Store</title>
    <link rel="stylesheet" href="dangnhap.css" />
    <style></style>
  </head>
  <body>
    <div class="register-container">
      <div class="logo">
        <img src="https://media.istockphoto.com/id/1320637680/vector/fast-shoes-logo-template-design.jpg?s=612x612&w=0&k=20&c=W0_unOy4G5mqeim5gVDGh1J4MaiW3-0k6GQeh6XGs9A=" alt="Shoe Store Logo" />
      </div>
      <h2>Register at Shoe Haven</h2>
      <form action="register.php" method="post">
        <div class="form-control">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Username" required />
        </div>
        <div class="form-control">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Email" required />
        </div>
        <div class="form-control">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required />
        </div>
        <button id="btn" style="font-weight: bold;" type="submit" onclick="register()">Register</button>
    </form>
    <script>
        function register(){
            window.location.assign("signin.html")
        }
    </script>
      </form>
      <div class="signin-link">
        Already have an account? <a href="signin.html">Sign in here</a>
      </div>
    </div>
  </body>
</html>
